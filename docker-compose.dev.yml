version: '3.9'

# Development override — only runs infrastructure
# Run services locally with: npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: risex_postgres_dev
    environment:
      POSTGRES_USER: risex
      POSTGRES_PASSWORD: risex_password
      POSTGRES_DB: risex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: risex_redis_dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: risex_redis_ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  postgres_dev_data:
  redis_dev_data:
