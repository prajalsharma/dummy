version: '3.9'

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: risex_postgres
    environment:
      POSTGRES_USER: risex
      POSTGRES_PASSWORD: risex_password
      POSTGRES_DB: risex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risex -d risex_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: risex_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Database Migration (runs once on startup) ──────────────────────────
  db-migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    container_name: risex_migrate
    environment:
      DATABASE_URL: postgresql://risex:risex_password@postgres:5432/risex_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ─── Application Services ───────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-server
    container_name: risex_api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://risex:risex_password@postgres:5432/risex_db
      REDIS_URL: redis://redis:6379
      PORT: 4000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      RISEX_API_BASE: ${RISEX_API_BASE:-https://api.rise.trade}
      RISEX_API_KEY: ${RISEX_API_KEY:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: risex_bot
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://risex:risex_password@postgres:5432/risex_db
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      RISEX_API_BASE: ${RISEX_API_BASE:-https://api.rise.trade}
      RISEX_API_KEY: ${RISEX_API_KEY:-}
      RISEX_API_SECRET: ${RISEX_API_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      ACCOUNT_PRIVATE_KEY: ${ACCOUNT_PRIVATE_KEY}
      SIGNER_PRIVATE_KEY: ${SIGNER_PRIVATE_KEY}
      RISECHAIN_CHAIN_ID: ${RISECHAIN_CHAIN_ID:-11155931}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  trading-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.trading-engine
    container_name: risex_engine
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://risex:risex_password@postgres:5432/risex_db
      REDIS_URL: redis://redis:6379
      RISEX_API_BASE: ${RISEX_API_BASE:-https://api.rise.trade}
      RISEX_API_KEY: ${RISEX_API_KEY:-}
      RISEX_API_SECRET: ${RISEX_API_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      ACCOUNT_PRIVATE_KEY: ${ACCOUNT_PRIVATE_KEY}
      SIGNER_PRIVATE_KEY: ${SIGNER_PRIVATE_KEY}
      RISECHAIN_RPC_URL: ${RISECHAIN_RPC_URL:-https://rpc.risechain.com/}
      RISECHAIN_WS_URL: ${RISECHAIN_WS_URL:-wss://rpc.risechain.com/}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  blockchain-listener:
    build:
      context: .
      dockerfile: docker/Dockerfile.blockchain-listener
    container_name: risex_listener
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://risex:risex_password@postgres:5432/risex_db
      REDIS_URL: redis://redis:6379
      RISECHAIN_RPC_URL: ${RISECHAIN_RPC_URL:-https://rpc.risechain.com/}
      RISECHAIN_WS_URL: ${RISECHAIN_WS_URL:-wss://rpc.risechain.com/}
      RISEX_WS_URL: ${RISEX_WS_URL:-wss://ws.rise.trade}
      RISEX_API_KEY: ${RISEX_API_KEY:-}
      USDC_CONTRACT_ADDRESS: ${USDC_CONTRACT_ADDRESS:-0x8a93d247134d91e0de6f96547cb0204e5be8e5d8}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
        NEXT_PUBLIC_RISECHAIN_RPC: ${RISECHAIN_RPC_URL:-https://rpc.risechain.com/}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        NEXT_PUBLIC_BOT_URL: ${NEXT_PUBLIC_BOT_URL:-https://t.me/RiseChain_RISEx_Bot}
    container_name: risex_web
    ports:
      - "3000:3000"
    depends_on:
      - api-server
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: risex_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api-server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
